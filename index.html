<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Shuttle Recorder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000; color: #fff;
            overflow: hidden; height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
        }

        /* ── Screens ── */
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }

        /* ── Pairing Screen ── */
        .pairing-screen {
            align-items: center; justify-content: center; gap: 20px; padding: 24px;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
        }

        .pairing-screen h1 { font-size: 24px; font-weight: 700; }
        .pairing-screen p.sub { font-size: 14px; color: #888; text-align: center; max-width: 280px; }

        .btn-primary {
            width: 100%; max-width: 280px; padding: 16px; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .btn-primary:active { transform: scale(0.97); }

        .btn-create { background: #e94560; color: #fff; }
        .btn-join { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        .divider { color: #555; font-size: 13px; margin: 4px 0; }

        /* ── Code Display ── */
        .code-display {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 24px; text-align: center; width: 100%; max-width: 280px;
        }
        .code-display .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .code-display .code {
            font-size: 36px; font-weight: 800; letter-spacing: 8px; font-family: monospace;
            color: #e94560;
        }
        .code-display .status { font-size: 13px; color: #888; margin-top: 12px; }
        .code-display .status.paired { color: #28a745; }

        /* ── Code Input ── */
        .code-input-group { width: 100%; max-width: 280px; }
        .code-input {
            width: 100%; padding: 16px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 14px; background: rgba(255,255,255,0.05); color: #fff;
            font-size: 24px; text-align: center; letter-spacing: 8px; font-family: monospace;
            text-transform: uppercase; outline: none;
        }
        .code-input::placeholder { letter-spacing: 2px; font-size: 16px; color: #555; }
        .code-input:focus { border-color: #e94560; }

        .btn-submit {
            width: 100%; max-width: 280px; padding: 14px; border: none; border-radius: 14px;
            background: #e94560; color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 12px;
        }
        .btn-submit:disabled { opacity: 0.4; pointer-events: none; }

        .btn-back {
            background: none; border: none; color: #888; font-size: 14px;
            cursor: pointer; margin-top: 8px; padding: 8px;
        }

        /* ── Server IP input ── */
        .server-config {
            width: 100%; max-width: 280px; margin-top: 4px;
        }
        .server-config label { font-size: 12px; color: #666; }
        .server-ip-input {
            width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff;
            font-size: 14px; text-align: center; font-family: monospace; outline: none;
        }
        .server-ip-input:focus { border-color: #e94560; }

        /* ── Sync Status ── */
        .sync-status {
            font-size: 13px; color: #888; text-align: center; margin-top: 8px;
            min-height: 20px;
        }
        .sync-status.synced { color: #28a745; }
        .sync-status.error { color: #e94560; }

        /* ── Shared preview styles ── */
        .preview-container {
            flex: 1; position: relative; display: flex;
            align-items: center; justify-content: center;
            background: #111; overflow: hidden;
        }

        video.cam-preview { width: 100%; height: 100%; object-fit: cover; }

        /* ── Detection Screen ── */
        .detection-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 24px 20px 20px;
        }

        .confidence-bar {
            width: 100%; height: 8px; background: rgba(255,255,255,0.15);
            border-radius: 4px; overflow: hidden; margin-bottom: 8px;
        }
        .confidence-fill {
            height: 100%; width: 0%; border-radius: 4px;
            transition: width 0.2s, background 0.3s;
        }

        .confidence-text {
            font-size: 32px; font-weight: 800; text-align: center;
            font-variant-numeric: tabular-nums; transition: color 0.3s;
        }

        .detection-label {
            font-size: 13px; color: #999; text-align: center; margin-top: 4px;
        }

        .partner-status-bar {
            position: absolute; top: 16px; left: 16px; right: 16px;
            display: flex; justify-content: space-between; gap: 12px;
        }

        .player-badge {
            flex: 1; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 12px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px;
        }
        .player-badge .badge-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #555;
            transition: background 0.3s;
        }
        .player-badge .badge-dot.ready { background: #28a745; }
        .player-badge .badge-dot.detecting { background: #f0ad4e; }
        .player-badge .badge-conf { font-family: monospace; margin-left: auto; }

        .countdown-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 8px; z-index: 60;
        }
        .countdown-overlay.visible { display: flex; }
        .countdown-number {
            font-size: 72px; font-weight: 900; color: #28a745;
        }
        .countdown-label { font-size: 16px; color: #ccc; }

        /* ── Recording Screen ── */
        .timer {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 16px; border-radius: 20px; font-size: 16px;
            font-variant-numeric: tabular-nums; display: none;
            align-items: center; gap: 8px;
        }
        .timer.visible { display: flex; }
        .timer .dot { width: 10px; height: 10px; background: #e94560; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .conn-badge {
            position: absolute; top: 16px; right: 16px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 20px; font-size: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .conn-badge .indicator {
            width: 8px; height: 8px; border-radius: 50%; background: #28a745;
        }
        .conn-badge .indicator.disconnected { background: #e94560; }

        .match-info {
            position: absolute; top: 16px; left: 16px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 20px; font-size: 12px;
            font-family: monospace; letter-spacing: 2px;
        }

        .controls {
            background: #111; padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            display: flex; align-items: center; justify-content: center; gap: 32px;
        }

        .btn-record {
            width: 72px; height: 72px; border-radius: 50%; border: 4px solid #fff;
            background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; -webkit-user-select: none; user-select: none;
        }
        .btn-record .inner {
            width: 54px; height: 54px; background: #e94560;
            border-radius: 50%; transition: all 0.25s;
        }
        .btn-record.recording .inner { width: 28px; height: 28px; border-radius: 6px; }
        .btn-record:active { transform: scale(0.92); }
        .btn-record:disabled { opacity: 0.3; pointer-events: none; }

        .btn-side {
            width: 48px; height: 48px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.12); color: #fff; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .btn-side:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }
        .btn-side:disabled { opacity: 0.3; pointer-events: none; }
        .btn-side svg { width: 24px; height: 24px; fill: #fff; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(40,167,69,0.95); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px;
            font-size: 15px; font-weight: 500;
            transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .waiting-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px; z-index: 50;
        }
        .waiting-overlay.visible { display: flex; }
        .waiting-overlay .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #e94560; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .waiting-overlay p { font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

<!-- ═══════ SCREEN 1: PAIRING ═══════ -->
<div class="screen pairing-screen active" id="screenPairing">
    <h1>Shuttle Recorder</h1>
    <p class="sub">Pair two phones to record a match from both sides with synced timestamps.</p>

    <div id="pairingButtons">
        <button class="btn-primary btn-create" id="btnCreate">Create Room</button>
        <div class="divider">or</div>
        <button class="btn-primary btn-join" id="btnJoin">Join Room</button>
    </div>

    <div class="code-display" id="codeDisplay" style="display:none">
        <div class="label">Share this code</div>
        <div class="code" id="roomCodeText">------</div>
        <div class="status" id="codeStatus">Waiting for opponent...</div>
    </div>

    <div class="code-input-group" id="codeInputGroup" style="display:none">
        <input class="code-input" id="codeInput" type="text" maxlength="6" placeholder="Enter code" autocomplete="off" />
        <button class="btn-submit" id="btnSubmitCode" disabled>Join</button>
    </div>

    <div class="sync-status" id="syncStatus"></div>
    <button class="btn-back" id="btnBackToPairing" style="display:none">Back</button>

    <div class="server-config">
        <label>Server IP (your Mac)</label>
        <input class="server-ip-input" id="serverIpInput" type="text" placeholder="192.168.1.X:8000" />
    </div>
</div>

<!-- ═══════ SCREEN 2: COURT DETECTION ═══════ -->
<div class="screen" id="screenDetection">
    <div class="preview-container">
        <video id="detectionPreview" class="cam-preview" autoplay muted playsinline></video>

        <div class="partner-status-bar">
            <div class="player-badge">
                <span class="badge-dot" id="myBadgeDot"></span>
                <span>You</span>
                <span class="badge-conf" id="myBadgeConf">0%</span>
            </div>
            <div class="player-badge">
                <span class="badge-dot" id="partnerBadgeDot"></span>
                <span>Partner</span>
                <span class="badge-conf" id="partnerBadgeConf">--</span>
            </div>
        </div>

        <div class="detection-overlay">
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill"></div>
            </div>
            <div class="confidence-text" id="confidenceText">0%</div>
            <div class="detection-label" id="detectionLabel">Point camera at the court</div>
        </div>

        <div class="countdown-overlay" id="countdownOverlay">
            <div class="countdown-number" id="countdownNumber">3</div>
            <div class="countdown-label">Both courts detected</div>
        </div>
    </div>
</div>

<!-- ═══════ SCREEN 3: RECORDING ═══════ -->
<div class="screen" id="screenRecording">
    <div class="preview-container">
        <video id="preview" class="cam-preview" autoplay muted playsinline></video>

        <div class="timer" id="timer">
            <span class="dot"></span>
            <span id="timerText">00:00</span>
        </div>

        <div class="match-info" id="matchInfo">------</div>
        <div class="conn-badge" id="connBadge">
            <span class="indicator" id="connIndicator"></span>
            <span id="connText">Connected</span>
        </div>

        <div class="waiting-overlay" id="waitingOverlay">
            <div class="spinner"></div>
            <p id="waitingText">Waiting for partner to start...</p>
        </div>
    </div>

    <div class="toast" id="toast">Video saved!</div>

    <div class="controls">
        <button class="btn-side" id="btnSwitch" title="Switch camera">
            <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><path d="M12 10.5c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5z"/></svg>
        </button>

        <button class="btn-record" id="btnRecord" title="Record">
            <div class="inner"></div>
        </button>

        <button class="btn-side" id="btnDownload" disabled title="Download last recording">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        </button>
    </div>
</div>

<!-- ═══════ Firebase SDK ═══════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, onDisconnect }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

// ── Firebase config ──
const app = initializeApp({
    apiKey: "AIzaSyD3VM2QANmrfwAzrMw2egmyCcja7QdVZDY",
    authDomain: "shuttle-recorder-29916.firebaseapp.com",
    databaseURL: "https://shuttle-recorder-29916-default-rtdb.firebaseio.com",
    projectId: "shuttle-recorder-29916",
    storageBucket: "shuttle-recorder-29916.firebasestorage.app",
    messagingSenderId: "1041259730311",
    appId: "1:1041259730311:web:c07a10cd3f12ef94f02f22"
});
const db = getDatabase(app);

// ── State ──
let roomCode = '';
let playerId = '';
let clockOffset = 0;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let stream = null;
let facingMode = 'environment';
let timerInterval = null;
let recordStartEpoch = 0;
let frameTimestamps = [];
let lastBlobUrl = null;
let unsubscribers = [];

// Court detection state
let courtWs = null;
let courtConfidence = 0;
let partnerConfidence = 0;
let bothReadySince = 0;
let detectionCanvas = null;
let detectionInterval = null;
const CONFIDENCE_START = 0.95;
const CONFIDENCE_STOP = 0.90;
const READY_DURATION_MS = 3000;

// Audio context for whistle (unlocked on first user gesture)
let audioCtx = null;

// ── DOM refs ──
const $ = id => document.getElementById(id);
const screenPairing = $('screenPairing');
const screenDetection = $('screenDetection');
const screenRecording = $('screenRecording');
const pairingButtons = $('pairingButtons');
const codeDisplay = $('codeDisplay');
const codeInputGroup = $('codeInputGroup');
const roomCodeText = $('roomCodeText');
const codeStatus = $('codeStatus');
const codeInput = $('codeInput');
const btnSubmitCode = $('btnSubmitCode');
const syncStatus = $('syncStatus');
const btnBackToPairing = $('btnBackToPairing');
const serverIpInput = $('serverIpInput');
const detectionPreview = $('detectionPreview');
const confidenceFill = $('confidenceFill');
const confidenceText = $('confidenceText');
const detectionLabel = $('detectionLabel');
const myBadgeDot = $('myBadgeDot');
const myBadgeConf = $('myBadgeConf');
const partnerBadgeDot = $('partnerBadgeDot');
const partnerBadgeConf = $('partnerBadgeConf');
const countdownOverlay = $('countdownOverlay');
const countdownNumber = $('countdownNumber');
const preview = $('preview');
const timer = $('timer');
const timerText = $('timerText');
const matchInfo = $('matchInfo');
const connIndicator = $('connIndicator');
const connText = $('connText');
const waitingOverlay = $('waitingOverlay');
const toast = $('toast');
const btnRecord = $('btnRecord');
const btnSwitch = $('btnSwitch');
const btnDownload = $('btnDownload');

// ── Server URL ──
serverIpInput.value = localStorage.getItem('serverUrl') || '';
serverIpInput.addEventListener('change', () => {
    localStorage.setItem('serverUrl', serverIpInput.value.trim());
});

function getServerUrl() {
    const val = serverIpInput.value.trim();
    if (!val) return null;
    // Add ws:// if not present
    if (val.startsWith('ws://') || val.startsWith('wss://')) return val;
    return `ws://${val}`;
}

function getServerHttpUrl() {
    const val = serverIpInput.value.trim();
    if (!val) return null;
    if (val.startsWith('http://') || val.startsWith('https://')) return val;
    return `http://${val}`;
}

// ── Unlock audio on first gesture ──
function unlockAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Play silent buffer to unlock
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
}

function playWhistle() {
    if (!audioCtx) return;
    // Generate a short whistle tone (two-tone beep)
    const now = audioCtx.currentTime;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(2000, now);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(2500, now);

    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 0.8);
    osc2.stop(now + 0.8);
}

// ═══════════════════════════════════
// PAIRING
// ═══════════════════════════════════

function generateCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
}

$('btnCreate').addEventListener('click', async () => {
    unlockAudio();
    roomCode = generateCode();
    playerId = 'p1';
    pairingButtons.style.display = 'none';
    codeDisplay.style.display = 'block';
    btnBackToPairing.style.display = 'block';
    roomCodeText.textContent = roomCode;
    codeStatus.textContent = 'Waiting for opponent...';
    codeStatus.className = 'status';
    syncStatus.textContent = '';

    await set(ref(db, `rooms/${roomCode}`), {
        p1: { joined: true, online: true },
        status: 'waiting',
        createdAt: Date.now()
    });

    onDisconnect(ref(db, `rooms/${roomCode}/p1/online`)).set(false);

    const unsub = onValue(ref(db, `rooms/${roomCode}/status`), (snap) => {
        const status = snap.val();
        if (status === 'paired') {
            codeStatus.textContent = 'Paired!';
            codeStatus.className = 'status paired';
            syncStatus.textContent = 'Starting clock sync...';
            startClockSync();
        }
    });
    unsubscribers.push(unsub);
});

$('btnJoin').addEventListener('click', () => {
    unlockAudio();
    pairingButtons.style.display = 'none';
    codeInputGroup.style.display = 'block';
    btnBackToPairing.style.display = 'block';
    codeInput.focus();
});

codeInput.addEventListener('input', () => {
    codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    btnSubmitCode.disabled = codeInput.value.length !== 6;
});

btnSubmitCode.addEventListener('click', async () => {
    roomCode = codeInput.value;
    playerId = 'p2';
    btnSubmitCode.disabled = true;
    syncStatus.textContent = 'Joining...';

    const snap = await get(ref(db, `rooms/${roomCode}`));
    if (!snap.exists()) {
        syncStatus.textContent = 'Room not found. Check the code.';
        syncStatus.className = 'sync-status error';
        btnSubmitCode.disabled = false;
        return;
    }

    await update(ref(db, `rooms/${roomCode}`), {
        'p2/joined': true,
        'p2/online': true,
        'status': 'paired'
    });

    onDisconnect(ref(db, `rooms/${roomCode}/p2/online`)).set(false);

    codeInputGroup.style.display = 'none';
    codeDisplay.style.display = 'block';
    roomCodeText.textContent = roomCode;
    codeStatus.textContent = 'Paired!';
    codeStatus.className = 'status paired';
    syncStatus.textContent = 'Starting clock sync...';

    startClockSync();
});

btnBackToPairing.addEventListener('click', () => {
    unsubscribers.forEach(fn => fn());
    unsubscribers = [];
    if (roomCode && playerId) {
        remove(ref(db, `rooms/${roomCode}/${playerId}`));
    }
    roomCode = '';
    playerId = '';
    pairingButtons.style.display = '';
    codeDisplay.style.display = 'none';
    codeInputGroup.style.display = 'none';
    btnBackToPairing.style.display = 'none';
    syncStatus.textContent = '';
    syncStatus.className = 'sync-status';
    codeInput.value = '';
    btnSubmitCode.disabled = true;
});

// ═══════════════════════════════════
// CLOCK SYNC
// ═══════════════════════════════════

async function startClockSync() {
    syncStatus.textContent = 'Syncing clocks...';
    const offsets = [];

    if (playerId === 'p1') {
        for (let i = 0; i < 10; i++) {
            const t1 = performance.now() + performance.timeOrigin;
            await set(ref(db, `rooms/${roomCode}/sync/ping`), { from: 'p1', t1, i });

            const pong = await waitForValue(ref(db, `rooms/${roomCode}/sync/pong`), v => v && v.i === i);
            const t4 = performance.now() + performance.timeOrigin;

            const offset = ((pong.t2 - t1) + (pong.t3 - t4)) / 2;
            offsets.push(offset);
            syncStatus.textContent = `Syncing clocks... (${i + 1}/10)`;
        }

        offsets.sort((a, b) => a - b);
        clockOffset = offsets[Math.floor(offsets.length / 2)];

        await set(ref(db, `rooms/${roomCode}/sync/result`), { offset: clockOffset, by: 'p1' });
        syncStatus.textContent = `Synced! Offset: ${clockOffset.toFixed(1)}ms`;
        syncStatus.className = 'sync-status synced';

        setTimeout(() => goToDetectionScreen(), 800);

    } else {
        let responded = 0;
        const unsub = onValue(ref(db, `rooms/${roomCode}/sync/ping`), async (snap) => {
            const data = snap.val();
            if (!data || data.from !== 'p1') return;

            const t2 = performance.now() + performance.timeOrigin;
            const t3 = performance.now() + performance.timeOrigin;
            await set(ref(db, `rooms/${roomCode}/sync/pong`), { t2, t3, i: data.i });
            responded++;
            syncStatus.textContent = `Syncing clocks... (${responded}/10)`;
        });
        unsubscribers.push(unsub);

        const result = await waitForValue(ref(db, `rooms/${roomCode}/sync/result`), v => v && v.by === 'p1');
        clockOffset = -result.offset;
        syncStatus.textContent = `Synced! Offset: ${clockOffset.toFixed(1)}ms`;
        syncStatus.className = 'sync-status synced';

        setTimeout(() => goToDetectionScreen(), 800);
    }
}

function waitForValue(dbRef, condition, timeoutMs = 15000) {
    return new Promise((resolve, reject) => {
        const t = setTimeout(() => { unsub(); reject(new Error('Sync timeout')); }, timeoutMs);
        const unsub = onValue(dbRef, (snap) => {
            const val = snap.val();
            if (condition(val)) { clearTimeout(t); unsub(); resolve(val); }
        });
    });
}

// ═══════════════════════════════════
// COURT DETECTION SCREEN
// ═══════════════════════════════════

async function goToDetectionScreen() {
    screenPairing.classList.remove('active');
    screenDetection.classList.add('active');

    await startCameraFor(detectionPreview);

    const serverUrl = getServerUrl();
    if (!serverUrl) {
        detectionLabel.textContent = 'No server IP set. Skipping court detection...';
        setTimeout(() => goToRecordingScreen(), 2000);
        return;
    }

    startCourtDetection();
    listenForPartnerConfidence();
}

async function startCameraFor(videoEl) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
            audio: true,
        });
        videoEl.srcObject = stream;
        return true;
    } catch (err) {
        console.error('Camera error:', err);
        showToast('Camera access denied');
        return false;
    }
}

function startCourtDetection() {
    const serverUrl = getServerUrl();
    const wsUrl = `${serverUrl}/ws/court-detection/${roomCode}/${playerId}`;

    detectionLabel.textContent = 'Connecting to server...';

    courtWs = new WebSocket(wsUrl);

    courtWs.onopen = () => {
        detectionLabel.textContent = 'Point camera at the court';
        detectionCanvas = document.createElement('canvas');
        detectionCanvas.width = 256;
        detectionCanvas.height = 256;

        // Send frames at 5fps
        detectionInterval = setInterval(captureAndSendFrame, 200);
    };

    courtWs.onmessage = (event) => {
        const data = JSON.parse(event.data);
        courtConfidence = data.confidence;
        updateConfidenceUI(courtConfidence);
        reportConfidenceToFirebase(courtConfidence);
        checkBothReady();
    };

    courtWs.onerror = (err) => {
        console.error('Court WS error:', err);
        detectionLabel.textContent = 'Server connection failed. Skipping...';
        stopCourtDetection();
        setTimeout(() => goToRecordingScreen(), 2000);
    };

    courtWs.onclose = () => {
        if (detectionInterval) {
            clearInterval(detectionInterval);
            detectionInterval = null;
        }
    };
}

function captureAndSendFrame() {
    if (!courtWs || courtWs.readyState !== WebSocket.OPEN) return;
    if (!stream || !detectionPreview.videoWidth) return;

    const ctx = detectionCanvas.getContext('2d');
    ctx.drawImage(detectionPreview, 0, 0, 256, 256);

    detectionCanvas.toBlob((blob) => {
        if (blob && courtWs && courtWs.readyState === WebSocket.OPEN) {
            blob.arrayBuffer().then(buf => courtWs.send(buf));
        }
    }, 'image/jpeg', 0.7);
}

function updateConfidenceUI(conf) {
    const pct = Math.round(conf * 100);
    confidenceText.textContent = `${pct}%`;
    confidenceFill.style.width = `${pct}%`;

    let color;
    if (conf >= CONFIDENCE_START) {
        color = '#28a745';
        detectionLabel.textContent = 'Court detected!';
    } else if (conf >= 0.5) {
        color = '#f0ad4e';
        detectionLabel.textContent = 'Adjusting...';
    } else {
        color = '#e94560';
        detectionLabel.textContent = 'Point camera at the court';
    }

    confidenceFill.style.background = color;
    confidenceText.style.color = color;

    myBadgeConf.textContent = `${pct}%`;
    myBadgeDot.className = conf >= CONFIDENCE_START ? 'badge-dot ready' :
                           conf >= 0.5 ? 'badge-dot detecting' : 'badge-dot';
}

async function reportConfidenceToFirebase(conf) {
    try {
        await set(ref(db, `rooms/${roomCode}/${playerId}/courtConfidence`), {
            value: conf,
            timestamp: Date.now()
        });
    } catch (e) { /* ignore */ }
}

function listenForPartnerConfidence() {
    const partnerId = playerId === 'p1' ? 'p2' : 'p1';
    const unsub = onValue(ref(db, `rooms/${roomCode}/${partnerId}/courtConfidence`), (snap) => {
        const data = snap.val();
        if (!data) return;
        partnerConfidence = data.value;
        const pct = Math.round(partnerConfidence * 100);
        partnerBadgeConf.textContent = `${pct}%`;
        partnerBadgeDot.className = partnerConfidence >= CONFIDENCE_START ? 'badge-dot ready' :
                                    partnerConfidence >= 0.5 ? 'badge-dot detecting' : 'badge-dot';
        checkBothReady();
    });
    unsubscribers.push(unsub);
}

function checkBothReady() {
    if (courtConfidence >= CONFIDENCE_START && partnerConfidence >= CONFIDENCE_START) {
        if (bothReadySince === 0) {
            bothReadySince = Date.now();
        }

        const elapsed = Date.now() - bothReadySince;
        const remaining = Math.ceil((READY_DURATION_MS - elapsed) / 1000);

        countdownOverlay.classList.add('visible');
        countdownNumber.textContent = Math.max(remaining, 0);

        if (elapsed >= READY_DURATION_MS) {
            triggerAutoRecording();
        }
    } else {
        bothReadySince = 0;
        countdownOverlay.classList.remove('visible');
    }
}

async function triggerAutoRecording() {
    // Stop court detection
    stopCourtDetection();

    // Play whistle
    playWhistle();

    // Signal recording start via Firebase
    await set(ref(db, `rooms/${roomCode}/recording`), {
        action: 'start',
        startedBy: 'auto-court-detection',
        epoch: performance.now() + performance.timeOrigin
    });

    // Transition to recording screen
    goToRecordingScreen();
}

function stopCourtDetection() {
    if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
    }
    if (courtWs && courtWs.readyState === WebSocket.OPEN) {
        courtWs.close();
    }
    courtWs = null;
}

// ═══════════════════════════════════
// RECORDING SCREEN
// ═══════════════════════════════════

async function goToRecordingScreen() {
    screenPairing.classList.remove('active');
    screenDetection.classList.remove('active');
    screenRecording.classList.add('active');
    matchInfo.textContent = roomCode;

    // Reattach stream to recording preview
    preview.srcObject = stream;

    listenForRecordingSignals();
    listenForPartnerOnline();
}

function listenForRecordingSignals() {
    const unsub = onValue(ref(db, `rooms/${roomCode}/recording`), (snap) => {
        const data = snap.val();
        if (!data) return;

        if (data.action === 'start' && !isRecording) {
            beginRecording(data.startedBy);
        } else if (data.action === 'stop' && isRecording) {
            endRecording(false);
        }
    });
    unsubscribers.push(unsub);
}

function listenForPartnerOnline() {
    const partnerId = playerId === 'p1' ? 'p2' : 'p1';
    const unsub = onValue(ref(db, `rooms/${roomCode}/${partnerId}/online`), (snap) => {
        const online = snap.val();
        if (online) {
            connIndicator.className = 'indicator';
            connText.textContent = 'Connected';
        } else {
            connIndicator.className = 'indicator disconnected';
            connText.textContent = 'Partner offline';
        }
    });
    unsubscribers.push(unsub);
}

// ── Record button (manual override) ──
btnRecord.addEventListener('click', async () => {
    if (!isRecording) {
        await set(ref(db, `rooms/${roomCode}/recording`), {
            action: 'start',
            startedBy: playerId,
            epoch: performance.now() + performance.timeOrigin
        });
    } else {
        await set(ref(db, `rooms/${roomCode}/recording`), {
            action: 'stop',
            stoppedBy: playerId,
            epoch: performance.now() + performance.timeOrigin
        });
    }
});

function beginRecording(startedBy) {
    if (isRecording) return;
    recordedChunks = [];
    frameTimestamps = [];

    const mimeType = getSupportedMimeType();
    const options = mimeType ? { mimeType } : {};

    try { mediaRecorder = new MediaRecorder(stream, options); }
    catch (e) { mediaRecorder = new MediaRecorder(stream); }

    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => saveRecording();
    mediaRecorder.start(100);

    isRecording = true;
    recordStartEpoch = performance.now() + performance.timeOrigin + clockOffset;
    btnRecord.classList.add('recording');
    btnSwitch.disabled = true;
    timer.classList.add('visible');
    waitingOverlay.classList.remove('visible');

    // Play whistle if auto-triggered (and we haven't already)
    if (startedBy === 'auto-court-detection') {
        playWhistle();
    }

    const startMs = Date.now();
    timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startMs) / 1000);
        timerText.textContent =
            String(Math.floor(elapsed / 60)).padStart(2, '0') + ':' +
            String(elapsed % 60).padStart(2, '0');
    }, 500);

    startFrameLogging();

    showToast(startedBy === playerId ? 'Recording started' :
              startedBy === 'auto-court-detection' ? 'Court detected - Recording!' :
              'Partner started recording');
}

function endRecording(selfTriggered = true) {
    if (!isRecording) return;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
    }
    isRecording = false;
    btnRecord.classList.remove('recording');
    btnSwitch.disabled = false;
    timer.classList.remove('visible');
    clearInterval(timerInterval);
    stopFrameLogging();
}

// ── Frame timestamp logging ──
let frameLoggingActive = false;

function startFrameLogging() {
    frameLoggingActive = true;
    const videoEl = preview;

    if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
        function onFrame(now, metadata) {
            if (!frameLoggingActive) return;
            frameTimestamps.push({
                frame: frameTimestamps.length,
                epoch: performance.now() + performance.timeOrigin + clockOffset,
                mediaTime: metadata.mediaTime,
                presentedFrames: metadata.presentedFrames
            });
            videoEl.requestVideoFrameCallback(onFrame);
        }
        videoEl.requestVideoFrameCallback(onFrame);
    } else {
        function onFrame() {
            if (!frameLoggingActive) return;
            frameTimestamps.push({
                frame: frameTimestamps.length,
                epoch: performance.now() + performance.timeOrigin + clockOffset
            });
            requestAnimationFrame(onFrame);
        }
        requestAnimationFrame(onFrame);
    }
}

function stopFrameLogging() {
    frameLoggingActive = false;
}

// ── Save recording + metadata ──
function saveRecording() {
    const mimeType = mediaRecorder.mimeType || 'video/webm';
    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const blob = new Blob(recordedChunks, { type: mimeType });
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const baseName = `${roomCode}_${playerId}_${ts}`;

    if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = URL.createObjectURL(blob);

    downloadFile(lastBlobUrl, `${baseName}.${ext}`);

    const metadata = {
        roomCode,
        playerId,
        clockOffset,
        recordStartEpoch,
        recordStopEpoch: performance.now() + performance.timeOrigin + clockOffset,
        totalFrames: frameTimestamps.length,
        fps: frameTimestamps.length > 1
            ? Math.round(1000 * (frameTimestamps.length - 1) /
                (frameTimestamps[frameTimestamps.length - 1].epoch - frameTimestamps[0].epoch))
            : 0,
        frames: frameTimestamps
    };

    const metaBlob = new Blob([JSON.stringify(metadata, null, 2)], { type: 'application/json' });
    const metaUrl = URL.createObjectURL(metaBlob);
    downloadFile(metaUrl, `${baseName}_timestamps.json`);
    setTimeout(() => URL.revokeObjectURL(metaUrl), 1000);

    btnDownload.disabled = false;
    showToast('Video + timestamps saved!');
}

function downloadFile(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
}

// ── Utility ──
function getSupportedMimeType() {
    const types = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm',
        'video/mp4',
    ];
    for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
    }
    return '';
}

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

btnSwitch.addEventListener('click', async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCameraFor(isRecording ? preview : detectionPreview);
    if (!isRecording) preview.srcObject = stream;
});

btnDownload.addEventListener('click', () => {
    if (lastBlobUrl) {
        const ext = (mediaRecorder?.mimeType || '').includes('mp4') ? 'mp4' : 'webm';
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        downloadFile(lastBlobUrl, `${roomCode}_${playerId}_${ts}.${ext}`);
    }
});

// ── Service worker ──
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>
